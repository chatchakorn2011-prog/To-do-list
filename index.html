<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- กำหนดให้ขนาดเว็บยืดหดตามหน้าจอมือถือ (Responsive) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการบ้าน & To-Do List</title>
    
    <!-- ส่วนของ CSS: ตกแต่งหน้าตาโปรแกรม -->
    <style>
        /* กำหนดตัวแปรสีสำหรับโหมดปกติ (Light Mode) */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #dddddd;
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --warning-color: #ff9f1c;
            --danger-color: #e71d36;
        }

        /* กำหนดตัวแปรสีสำหรับโหมดมืด (Dark Mode) */
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #444444;
            --primary-color: #357abd;
        }

        /* ตั้งค่าพื้นฐาน */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ส่วนหัวและปุ่มเปลี่ยนโหมด */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            cursor: pointer;
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-theme {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        /* การจัดวางกล่องเนื้อหา (Card) */
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        /* หน้ารายงาน Dashboard (Grid) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .dash-item {
            background-color: var(--bg-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .dash-num {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* แบบฟอร์มกรอกข้อมูล */
        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            font-size: 16px;
        }

        /* ส่วนของการกรองข้อมูล ค้นหา */
        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        /* ส่วนของการแสดงรายการงาน (Task List) */
        .task-item {
            border-left: 5px solid var(--border-color);
            padding: 15px;
            margin-bottom: 10px;
            background-color: var(--bg-color);
            border-radius: 0 8px 8px 0;
            position: relative;
        }

        /* สีแบ่งตามความสำคัญ */
        .priority-high { border-left-color: var(--danger-color); }
        .priority-medium { border-left-color: var(--warning-color); }
        .priority-low { border-left-color: var(--success-color); }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .task-title {
            font-weight: bold;
            font-size: 16px;
        }

        .task-details {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .task-actions {
            margin-top: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-success { background-color: var(--success-color); color: white; }
        .btn-warning { background-color: var(--warning-color); color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-clear { background-color: #888888; color: white; margin-top: 10px;}

        /* ป้ายบอกสถานะ */
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ส่วนหัวโปรแกรม -->
        <header>
            <h1>My To-Do List 📝</h1>
            <button class="btn-theme" id="themeToggle" onclick="toggleTheme()">โหมดมืด 🌙</button>
        </header>

        <!-- ส่วนที่ 1: แดชบอร์ดสรุปข้อมูล -->
        <div class="card">
            <h2>📊 รายงานภาพรวม (Dashboard)</h2>
            <div class="dashboard-grid">
                <div class="dash-item">
                    <div class="dash-num" id="dash-all">0</div>
                    <div style="font-size: 12px;">งานทั้งหมด</div>
                </div>
                <div class="dash-item">
                    <div class="dash-num" id="dash-pending" style="color: var(--warning-color);">0</div>
                    <div style="font-size: 12px;">กำลังทำ/ยังไม่ทำ</div>
                </div>
                <div class="dash-item">
                    <div class="dash-num" id="dash-done" style="color: var(--success-color);">0</div>
                    <div style="font-size: 12px;">เสร็จแล้ว</div>
                </div>
            </div>
            <div id="dash-urgent" style="font-size: 13px; font-weight: bold; color: var(--danger-color);"></div>
            <div id="dash-subjects" style="font-size: 12px; margin-top: 8px; color: var(--text-muted);"></div>
        </div>

        <!-- ส่วนที่ 2: ฟอร์มเพิ่ม/แก้ไขข้อมูล -->
        <div class="card">
            <h2 id="form-title">➕ เพิ่มรายการงานใหม่</h2>
            <input type="hidden" id="edit-id"> <!-- เก็บ ID ลับๆ ไว้ตอนแก้ไขข้อมูล -->
            
            <div class="form-group">
                <label>ชื่องาน / การบ้าน</label>
                <input type="text" id="task-title" placeholder="เช่น ส่งรายงานวิทย์, อ่านหนังสือสอบ">
            </div>
            <div class="form-group">
                <label>รายวิชา</label>
                <input type="text" id="task-subject" placeholder="เช่น คณิตศาสตร์, ภาษาอังกฤษ">
            </div>
            <div class="form-group">
                <label>วันที่ครบกำหนดส่ง</label>
                <input type="date" id="task-date">
            </div>
            <div class="form-group">
                <label>ระดับความสำคัญ</label>
                <select id="task-priority">
                    <option value="low">ต่ำ (สีเขียว)</option>
                    <option value="medium" selected>ปานกลาง (สีส้ม)</option>
                    <option value="high">สูง (สีแดง)</option>
                </select>
            </div>
            <button class="btn-block" id="btn-save" onclick="saveTask()">บันทึกข้อมูล</button>
            <button class="btn-block btn-clear" id="btn-cancel-edit" onclick="resetForm()" style="display:none;">ยกเลิกการแก้ไข</button>
        </div>

        <!-- ส่วนที่ 3: ตัวค้นหาและกรองข้อมูล -->
        <div class="card">
            <h2>🔍 ค้นหาและกรองข้อมูล</h2>
            <div class="form-group">
                <input type="text" id="search-text" placeholder="พิมพ์ชื่องานเพื่อค้นหา..." oninput="render()">
            </div>
            <div class="search-grid">
                <div>
                    <label style="font-size: 12px;">กรองวิชา</label>
                    <select id="filter-subject" onchange="render()">
                        <option value="all">ทั้งหมด</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 12px;">กรองสถานะ</label>
                    <select id="filter-status" onchange="render()">
                        <option value="all">ทั้งหมด</option>
                        <option value="todo">ยังไม่ทำ</option>
                        <option value="doing">กำลังทำ</option>
                        <option value="done">เสร็จแล้ว</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 12px;">ความสำคัญ</label>
                    <select id="filter-priority" onchange="render()">
                        <option value="all">ทั้งหมด</option>
                        <option value="low">ต่ำ</option>
                        <option value="medium">ปานกลาง</option>
                        <option value="high">สูง</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- ส่วนที่ 4: แสดงรายการงาน -->
        <div class="card">
            <h2>📋 รายการสิ่งที่ต้องทำ</h2>
            <div id="task-list">
                <!-- ข้อมูลจาก JavaScript จะมาโผล่ตรงนี้ -->
            </div>
            <button class="btn-danger btn-clear" onclick="clearCompletedTasks()">🧹 ลบงานที่เสร็จแล้วทั้งหมด</button>
        </div>
    </div>

    <!-- ส่วนของ JavaScript: ควบคุมระบบการทำงาน -->
    <script>
        // 1. ตัวแปรเก็บข้อมูลหลัก (ถ้ามีข้อมูลเก่าใน LocalStorage ให้ดึงมาใช้ ถ้าไม่มีให้เป็นอาร์เรย์ว่าง)
        let tasks = JSON.parse(localStorage.getItem('my_tasks')) || [];

        // 2. ฟังก์ชันบันทึกข้อมูล (ใช้ทั้งเพิ่มใหม่และแก้ไข)
        function saveTask() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('task-title').value.trim();
            const subject = document.getElementById('task-subject').value.trim() || 'ทั่วไป';
            const date = document.getElementById('task-date').value;
            const priority = document.getElementById('task-priority').value;

            if (!title || !date) {
                alert('กรุณากรอกชื่องานและเลือกวันที่ส่งด้วยนะจร้าน้องๆ!');
                return;
            }

            if (id) {
                // กรณี: แก้ไขข้อมูลเดิม
                const taskIndex = tasks.findIndex(t => t.id == id);
                if (taskIndex > -1) {
                    tasks[taskIndex].title = title;
                    tasks[taskIndex].subject = subject;
                    tasks[taskIndex].date = date;
                    tasks[taskIndex].priority = priority;
                }
            } else {
                // กรณี: เพิ่มข้อมูลใหม่
                const newTask = {
                    id: Date.now(), // ใช้เวลาปัจจุบันทำเป็น ID แบบไม่ซ้ำกัน
                    title: title,
                    subject: subject,
                    date: date,
                    priority: priority,
                    status: 'todo' // ค่าเริ่มต้นคือยังไม่ทำ
                };
                tasks.push(newTask);
            }

            saveToLocalStorage();
            resetForm();
            render();
        }

        // 3. ฟังก์ชันลบงานรายรายการ
        function deleteTask(id) {
            if(confirm('แน่ใจไหมว่าจะลบงานนี้?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveToLocalStorage();
                render();
            }
        }

        // 4. ฟังก์ชันเปลี่ยนสถานะงาน (ยังไม่ทำ -> กำลังทำ -> เสร็จแล้ว)
        function updateStatus(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.status = newStatus;
                saveToLocalStorage();
                render();
            }
        }

        // 5. ฟังก์ชันเตรียมข้อมูลขึ้นไปแก้ไขบนฟอร์ม
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                document.getElementById('edit-id').value = task.id;
                document.getElementById('task-title').value = task.title;
                document.getElementById('task-subject').value = task.subject;
                document.getElementById('task-date').value = task.date;
                document.getElementById('task-priority').value = task.priority;
                
                document.getElementById('form-title').innerText = "✏️ แก้ไขข้อมูลงาน";
                document.getElementById('btn-save').innerText = "บันทึกการแก้ไข";
                document.getElementById('btn-cancel-edit').style.display = "block";
            }
        }

        // 6. ฟังก์ชันล้างฟอร์มให้กลับเป็นสถานะเพิ่มงานใหม่
        function resetForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('task-title').value = '';
            document.getElementById('task-subject').value = '';
            document.getElementById('task-date').value = '';
            document.getElementById('task-priority').value = 'medium';
            
            document.getElementById('form-title').innerText = "➕ เพิ่มรายการงานใหม่";
            document.getElementById('btn-save').innerText = "บันทึกข้อมูล";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        // 7. ฟังก์ชันลบงานที่ทำเสร็จแล้วทั้งหมด
        function clearCompletedTasks() {
            if(confirm('ต้องการลบงานที่ขึ้นว่าเสร็จแล้วทั้งหมดใช่ไหม?')) {
                tasks = tasks.filter(t => t.status !== 'done');
                saveToLocalStorage();
                render();
            }
        }

        // 8. ฟังก์ชันบันทึกข้อมูลลงหน่วยความจำของเครื่อง (Local Storage)
        function saveToLocalStorage() {
            localStorage.setItem('my_tasks', JSON.stringify(tasks));
        }

        // 9. ฟังก์ชันจัดการระบบเปลี่ยนโหมดมืด/สว่าง
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = 'light';
            if (currentTheme !== 'dark') {
                newTheme = 'dark';
                document.getElementById('themeToggle').innerText = "โหมดสว่าง ☀️";
            } else {
                document.getElementById('themeToggle').innerText = "โหมดมืด 🌙";
            }
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 10. ฟังก์ชันหลักในการประมวลผล คัดกรอง และวาดหน้าตาโปรแกรม (Render)
        function render() {
            const container = document.getElementById('task-list');
            const searchText = document.getElementById('search-text').value.toLowerCase();
            const filterSubject = document.getElementById('filter-subject').value;
            const filterStatus = document.getElementById('filter-status').value;
            const filterPriority = document.getElementById('filter-priority').value;

            // กรองเงื่อนไขการอัปเดตตัวกรองวิชาในเมนูเลือก
            updateSubjectFilterOptions();

            // เรียงลำดับตามวันที่ (ส่งก่อนอยู่บน)
            let filteredTasks = [...tasks].sort((a, b) => new Date(a.date) - new Date(b.date));

            // ค้นหาตามชื่องาน
            if (searchText) {
                filteredTasks = filteredTasks.filter(t => t.title.toLowerCase().includes(searchText));
            }
            // กรองตามรายวิชา
            if (filterSubject !== 'all') {
                filteredTasks = filteredTasks.filter(t => t.subject === filterSubject);
            }
            // กรองตามสถานะ
            if (filterStatus !== 'all') {
                filteredTasks = filteredTasks.filter(t => t.status === filterStatus);
            }
            // กรองตามระดับความสำคัญ
            if (filterPriority !== 'all') {
                filteredTasks = filteredTasks.filter(t => t.priority === filterPriority);
            }

            // แสดงผลรายการใน HTML
            container.innerHTML = '';
            if(filteredTasks.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">ไม่พบรายการงาน</p>';
            }

            filteredTasks.forEach(task => {
                const item = document.createElement('div');
                item.className = `task-item priority-${task.priority}`;
                
                // แปลงสถานะเป็นข้อความภาษาไทยและสีป้าย
                let statusText = 'ยังไม่ทำ';
                let badgeColor = 'var(--danger-color)';
                if(task.status === 'doing') { statusText = 'กำลังทำ'; badgeColor = 'var(--warning-color)'; }
                if(task.status === 'done') { statusText = 'เสร็จแล้ว'; badgeColor = 'var(--success-color)'; }

                // รูปแบบปุ่มเปลี่ยนสถานะตามขั้นตอนปัจจุบัน
                let statusButtons = '';
                if(task.status !== 'todo') statusButtons += `<button class="btn-sm" onclick="updateStatus(${task.id}, 'todo')">ยังไม่ทำ</button> `;
                if(task.status !== 'doing') statusButtons += `<button class="btn-sm btn-warning" onclick="updateStatus(${task.id}, 'doing')">กำลังทำ</button> `;
                if(task.status !== 'done') statusButtons += `<button class="btn-sm btn-success" onclick="updateStatus(${task.id}, 'done')">เสร็จแล้ว</button> `;

                // คำนวณวันที่ภาษาไทยแบบเข้าใจง่าย
                const today = new Date().toISOString().split('T')[0];
                const isUrgent = task.date === today && task.status !== 'done' ? '⚠️ กำหนดส่งวันนี้!' : `กำหนดส่ง: ${task.date}`;

                item.innerHTML = `
                    <div class="task-header">
                        <div>
                            <span class="badge" style="background-color:${badgeColor}">${statusText}</span>
                            <span class="task-title">${task.title}</span>
                            <div class="task-details">วิชา: <b>${task.subject}</b> | ${isUrgent}</div>
                        </div>
                    </div>
                    <div class="task-actions">
                        ${statusButtons}
                        <button class="btn-sm" style="background-color:#7f8c8d; color:white;" onclick="editTask(${task.id})">✏️ แก้ไข</button>
                        <button class="btn-sm btn-danger" onclick="deleteTask(${task.id})">🗑️ ลบ</button>
                    </div>
                `;
                container.appendChild(item);
            });

            // อัปเดตข้อมูลแดชบอร์ดรายงานผล
            updateDashboard();
        }

        // 11. ฟังก์ชันอัปเดตตัวเลือกรายวิชาในกล่องตัวกรอง
        function updateSubjectFilterOptions() {
            const filterSelect = document.getElementById('filter-subject');
            const currentSelected = filterSelect.value;
            
            // ดึงรายวิชาที่มีทั้งหมดแบบไม่ซ้ำกัน
            const subjects = [...new Set(tasks.map(t => t.subject))];
            
            filterSelect.innerHTML = '<option value="all">ทั้งหมด</option>';
            subjects.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub;
                opt.innerText = sub;
                if(sub === currentSelected) opt.selected = true;
                filterSelect.appendChild(opt);
            });
        }

        // 12. ฟังก์ชันคำนวณและแสดงผล Dashboard
        function updateDashboard() {
            const total = tasks.length;
            const done = tasks.filter(t => t.status === 'done').length;
            const pending = total - done;

            document.getElementById('dash-all').innerText = total;
            document.getElementById('dash-done').innerText = done;
            document.getElementById('dash-pending').innerText = pending;

            // หางานเร่งด่วนที่ต้องส่งวันนี้
            const today = new Date().toISOString().split('T')[0];
            const urgentTasks = tasks.filter(t => t.date === today && t.status !== 'done');
            const urgentDiv = document.getElementById('dash-urgent');
            if(urgentTasks.length > 0) {
                urgentDiv.innerText = `🚨 วันนี้มีงานต้องส่งด่วน ${urgentTasks.length} งาน!`;
            } else {
                urgentDiv.innerText = `✅ วันนี้ไม่มีงานค้างส่งด่วนยอดเยี่ยมมาก`;
            }

            // นับจำนวนงานแยกตามวิชา
            const subjectCounts = {};
            tasks.forEach(t => {
                if(t.status !== 'done') {
                    subjectCounts[t.subject] = (subjectCounts[t.subject] || 0) + 1;
                }
            });
            
            let subjectText = 'งานค้างแยกตามวิชา: ';
            const subEntries = Object.entries(subjectCounts);
            if(subEntries.length > 0) {
                subjectText += subEntries.map(([sub, count]) => `${sub} (${count})`).join(', ');
            } else {
                subjectText += 'ไม่มีงานค้างเลย';
            }
            document.getElementById('dash-subjects').innerText = subjectText;
        }

        // 13. ตรวจสอบโหมดมืดที่เคยบันทึกไว้ตอนเปิดหน้าเว็บครั้งแรก
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if(savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').innerText = "โหมดสว่าง ☀️";
            }
            render(); // เรียกแสดงผลครั้งแรก
        }
    </script>
</body>
</html>
